<!DOCTYPE html>
<html lang="en" dir="ltr" class="theme-light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Super Charts — TradingView Clone</title>
    
    <!-- Link to existing styles if any, but we'll use a clean layout -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Simplified Header to match navigation.js expectations */
        .tv-header {
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e0e3eb;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 1001;
        }

        .tv-header__container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            gap: 24px;
        }

        .tv-header__link--logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #2962ff;
            font-weight: 700;
            font-size: 22px;
        }

        .tv-header__main-menu {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 16px;
        }

        /* Chart Container */
        .chart-container {
            height: calc(100vh - 60px);
            width: 100%;
            position: relative;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .tv-header {
                height: 50px;
                padding: 0 12px;
            }
            .chart-container {
                height: calc(100vh - 50px);
            }
            .tv-header__main-menu {
                display: none; /* Let navigation.js handle mobile menu toggle */
            }
        }
    </style>
</head>
<body class="chart-page">
    <header class="tv-header">
        <div class="tv-header__container">
            <!-- Mobile Menu Toggle (optional hook for navigation.js) -->
            <button class="js-header-main-menu-mobile-button" style="display:none;"></button>
            <a class="tv-header__link--logo" href="../index.html">
                <svg width="36" height="28" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2c0-1.10457.8954-2 2-2h4c1.1046 0 2 .89543 2 2v24c0 1.1046-.8954 2-2 2h-4c-1.1046 0-2-.8954-2-2V2z" fill="#2962FF"/><path d="M0 12c0-1.1046.895431-2 2-2h4c1.10457 0 2 .8954 2 2v14c0 1.1046-.89543 2-2 2H2c-1.104569 0-2-.8954-2-2V12z" fill="#2962FF"/><path d="M28 8c0-1.10457.8954-2 2-2h4c1.1046 0 2 .89543 2 2v18c0 1.1046-.8954 2-2 2h-4c-1.1046 0-2-.8954-2-2V8z" fill="#2962FF"/></svg>
                <span style="margin-left: 8px;">Super Charts</span>
            </a>
            <ul class="tv-header__main-menu">
                <!-- Populated by navigation.js -->
            </ul>
        </div>
    </header>

    <main class="chart-container">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart_platform" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget(
            {
                "autosize": true,
                "symbol": "NASDAQ:AAPL",
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "light",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "withdateranges": true,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "details": true,
                "hotlist": true,
                "calendar": true,
                "show_popup_button": true,
                "popup_width": "1000",
                "popup_height": "650",
                "container_id": "tradingview_chart_platform"
            });
            </script>
        </div>
        <!-- TradingView Widget END -->
    </main>

    <!-- Navigation JS -->
    <script src="../navigation.js"></script>
</body>
</html>
